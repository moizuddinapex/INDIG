<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pant Detail | INDIG-GROK</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #c5a059; --dark-bg: #0a0a0a; }
        body { margin: 0; background-color: var(--dark-bg); color: #ffffff; font-family: 'Cinzel', serif; }
        body::before { content: ""; position: fixed; inset: 0; background: url('images/backgroundimage1.jpg') center/cover no-repeat; filter: brightness(0.2); z-index: -1; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .product-detail-container { display: flex; flex-wrap: wrap; gap: 3rem; max-width: 1200px; margin: 2rem auto; padding: 2rem; }
        .image-gallery { flex: 1; min-width: 280px; }
        .image-gallery img { width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        .product-info { flex: 1; min-width: 280px; }
        .size-options { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
        .size-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1rem; cursor: pointer; transition: all 0.3s; }
        .size-btn:hover, .size-btn.selected { border-color: var(--gold); background: var(--gold); color: black; }
        .add-to-cart { background: var(--gold); color: black; padding: 1rem 2rem; width: 100%; font-weight: bold; letter-spacing: 0.2em; cursor: pointer; border: none; margin-top: 1rem; }
        .price { font-size: 1.5rem; color: var(--gold); margin: 1rem 0; }
        /* Add your cart sidebar styles here */
        .cart-overlay, .cart-sidebar { /* same as your existing styles */ }
    </style>
</head>
<body>
    <nav class="flex justify-between items-center px-8 py-8 uppercase tracking-[0.3em] text-[10px] border-b border-white/10">
        <a href="index.html" style="font-family: 'Noto Serif', serif; font-size: 1.5rem; text-decoration: none; color: white;">INDIG-GROK</a>
        <div class="space-x-10">
            <a href="pants.html" class="hover:text-gray-400 transition">Back to Pants</a>
            <button onclick="openCart()" class="border border-white px-3 py-1 hover:bg-white hover:text-black transition">BAG <span id="cart-count">(0)</span></button>
        </div>
    </nav>

    <div class="product-detail-container" id="product-detail">
        <!-- Content loaded dynamically -->
        <div class="image-gallery">
            <img id="main-image" src="" alt="Product Image">
        </div>
        <div class="product-info">
            <h1 id="product-name" class="text-2xl tracking-wider"></h1>
            <p id="product-description" class="text-gray-400 text-sm my-4"></p>
            <div class="price" id="product-price"></div>
            <div class="size-selector">
                <p class="text-xs tracking-wider mb-2">SELECT SIZE</p>
                <div class="size-options" id="size-options">
                    <!-- Size buttons will be added here -->
                </div>
                <div class="size-display text-[10px] text-[var(--gold)] mt-2" id="selected-size">Size: MED</div>
            </div>
            <button class="add-to-cart" id="add-to-cart-btn">ADD TO CART</button>
        </div>
    </div>

    <!-- Cart Overlay & Sidebar -->
    <div id="cartOverlay" class="cart-overlay"></div>
    <div id="cartSidebar" class="cart-sidebar"><button id="closeCart" class="close-btn">×</button><h2>My Cart</h2><div id="cart-items-container"></div><div class="cart-footer"><span id="cart-total-price">$0</span><button onclick="goToCheckout()">Checkout</button></div></div>

    <script src="js/checkout.js"></script>
    <script>
        // Pant data (same as listing page)
        const pants = [
            { id: 1, name: "SIGNATURE CHINO", price: 135, frontImage: "images/pant1.1.1.png", backImage: "images/pant1.1.2.png", description: "Effortless refinement. Tailored for movement, designed for distinction.", sizes: ["28", "30", "32", "34", "36", "38"] },
            { id: 2, name: "TAILORED TROUSER", price: 155, frontImage: "images/pant1.2.1.png", backImage: "images/pant1.2.2.png", description: "Sharp pleats, clean lines. The foundation of a refined wardrobe.", sizes: ["28", "30", "32", "34", "36", "38"] },
            { id: 3, name: "COTTON TWILL PANT", price: 125, frontImage: "images/pant1.3.1.png", backImage: "images/pant1.3.2.png", description: "Rugged elegance meets everyday comfort. Built to last.", sizes: ["28", "30", "32", "34", "36", "38"] },
            { id: 4, name: "FLANNEL TROUSER", price: 165, frontImage: "images/pant1.4.1.png", backImage: "images/pant1.4.2.png", description: "Luxurious softness. Perfect for cooler evenings.", sizes: ["28", "30", "32", "34", "36", "38"] },
            { id: 5, name: "PLEATED WOOL PANT", price: 195, frontImage: "images/pant1.5.1.png", backImage: "images/pant1.5.2.png", description: "Heritage styling. Exceptional drape and warmth.", sizes: ["28", "30", "32", "34", "36", "38"] }
        ];

        let currentPant = null;
        let selectedSize = "MED";

        function getPantFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            currentPant = pants.find(p => p.id === id) || pants[0];
        }

        function renderDetail() {
            if (!currentPant) return;
            document.getElementById('main-image').src = currentPant.frontImage;
            document.getElementById('product-name').textContent = currentPant.name;
            document.getElementById('product-description').textContent = currentPant.description;
            document.getElementById('product-price').textContent = `$${currentPant.price}`;
            
            // Render size buttons
            const sizeContainer = document.getElementById('size-options');
            sizeContainer.innerHTML = currentPant.sizes.map(size => `
                <button class="size-btn ${selectedSize === size ? 'selected' : ''}" onclick="selectSize('${size}')">${size}</button>
            `).join('');
            document.getElementById('selected-size').textContent = `Size: ${selectedSize}`;
        }

        function selectSize(size) {
            selectedSize = size;
            document.getElementById('selected-size').textContent = `Size: ${selectedSize}`;
            const buttons = document.querySelectorAll('.size-btn');
            buttons.forEach(btn => {
                if (btn.textContent === size) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
        }

        function addToCart() {
            const cartItem = {
                name: `${currentPant.name} (${selectedSize})`,
                price: currentPant.price,
                image: currentPant.frontImage,
                qty: 1,
                size: selectedSize
            };
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push(cartItem);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            openCart();
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const countSpan = document.getElementById('cart-count');
            if (countSpan) countSpan.innerText = `(${cart.length})`;
        }

        // Expose functions globally
        window.selectSize = selectSize;
        window.addToCart = addToCart;

        document.addEventListener('DOMContentLoaded', () => {
            getPantFromUrl();
            renderDetail();
            updateCartCount();
            document.getElementById('add-to-cart-btn').addEventListener('click', addToCart);
        });
    </script>
</body>
</html>
