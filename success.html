<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | INDIG-GROK</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel', serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('images/backgroundimage1.jpg') center/cover no-repeat;
            filter: brightness(0.2);
            z-index: -1;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .box {
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 10px;
            max-width: 520px;
            margin: 2rem;
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Checkmark Animation */
        .checkmark-circle {
            width: 80px;
            height: 80px;
            background: var(--gold, #c5a059);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            animation: scaleIn 0.5s ease-out 0.3s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .checkmark {
            width: 40px;
            height: 40px;
            color: black;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            color: var(--gold, #c5a059);
            text-transform: uppercase;
        }

        .greeting {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.02em;
        }

        .order-summary {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 8px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            text-align: left;
        }

        .order-summary h3 {
            color: var(--gold, #c5a059);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-align: center;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--gold, #c5a059);
            font-weight: bold;
            color: var(--gold, #c5a059);
        }

        .order-number {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 0.8rem;
            letter-spacing: 0.05em;
        }

        .message {
            font-size: 0.9rem;
            color: #ccc;
            margin: 1rem 0;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 1rem 2.5rem;
            background: var(--gold, #c5a059);
            color: black;
            text-decoration: none;
            letter-spacing: 0.3em;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: white;
            transform: translateY(-2px);
        }

        .confetti-message {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: var(--gold, #c5a059);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <div class="box">
        <div class="checkmark-circle">
            <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1>THANK YOU</h1>
        
        <div class="greeting" id="greeting-message">
            Dear Valued Customer,
        </div>

        <div class="order-summary" id="order-summary">
            <h3>Order Summary</h3>
            <div id="order-items"></div>
            <div class="order-total" id="order-total">
                <span>Total</span>
                <span>$0</span>
            </div>
            <div class="order-number" id="order-number"></div>
        </div>

        <p class="message">
            Your order has been placed successfully!<br>
            Our team will contact you shortly via WhatsApp to confirm your order.
        </p>

        <a href="index.html" class="btn">Back to Store</a>
        <div class="confetti-message">✨ Your order is being processed ✨</div>
    </div>

    <script>
        // Generate random order number
        function generateOrderNumber() {
            const prefix = 'IND';
            const timestamp = Date.now().toString().slice(-8);
            const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            return `${prefix}-${timestamp}-${random}`;
        }

        // Format date
        function formatDate() {
            const date = new Date();
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Load cart data and display order summary
        function loadOrderSummary() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const orderItemsContainer = document.getElementById('order-items');
            const orderTotalSpan = document.getElementById('order-total');
            
            let total = 0;
            
            if (cart.length === 0) {
                orderItemsContainer.innerHTML = '<div class="order-item">No items found</div>';
                return;
            }
            
            orderItemsContainer.innerHTML = '';
            
            cart.forEach(item => {
                const qty = item.qty || 1;
                const itemTotal = item.price * qty;
                total += itemTotal;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'order-item';
                itemDiv.innerHTML = `
                    <span>${item.name} × ${qty}</span>
                    <span>$${itemTotal.toFixed(2)}</span>
                `;
                orderItemsContainer.appendChild(itemDiv);
            });
            
            orderTotalSpan.innerHTML = `<span>Total</span><span>$${total.toFixed(2)}</span>`;
            
            // Display order number
            const orderNumber = generateOrderNumber();
            document.getElementById('order-number').innerHTML = `Order #: ${orderNumber}<br>${formatDate()}`;
            
            return { cart, total };
        }

        // Get customer name from localStorage (if stored during checkout)
        function getCustomerName() {
            const customerName = localStorage.getItem('customerName');
            if (customerName) {
                document.getElementById('greeting-message').innerHTML = `Dear ${customerName},`;
                // Clear after use
                localStorage.removeItem('customerName');
            } else {
                document.getElementById('greeting-message').innerHTML = `Dear Valued Customer,`;
            }
        }

        // Confetti Animation
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            canvas.width = width;
            canvas.height = height;
            
            let particles = [];
            const particleCount = 150;
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height - height,
                    size: Math.random() * 8 + 4,
                    speedY: Math.random() * 5 + 3,
                    speedX: (Math.random() - 0.5) * 2,
                    color: `hsl(${Math.random() * 60 + 30}, 70%, 60%)`, // Gold/amber tones
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                let allDone = true;
                
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    
                    if (p.y < height + 100) {
                        allDone = false;
                    }
                    
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                }
                
                if (!allDone) {
                    requestAnimationFrame(animate);
                }
            }
            
            animate();
            
            // Stop confetti after 3 seconds
            setTimeout(() => {
                ctx.clearRect(0, 0, width, height);
            }, 4000);
        }
        
        // Also add window resize handler
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Initialize page
        loadOrderSummary();
        getCustomerName();
        startConfetti();
        
        // Clear cart after showing summary
        setTimeout(() => {
            localStorage.removeItem('cart');
        }, 100);
    </script>
</body>
</html>
